<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#f2efe8" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#131210" media="(prefers-color-scheme: dark)" />
  <meta name="description" content="Gym&Jam · Organiza tus entrenos, registra kilos y repeticiones, y visualiza tu progreso con estadísticas potentes." />
  <title>Gym&Jam · Tu diario de entrenamiento</title>

  <!-- PWA -->
  <link rel="manifest" href="/manifest.webmanifest" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Gym&Jam" />
  <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
  <link rel="mask-icon" href="assets/favicon.svg" color="#e0451f" />
  <link rel="stylesheet" href="css/styles.css" />
  <script>
    /* Apply saved theme before first paint to avoid a flash. */
    (function () {
      try {
        var t = localStorage.getItem("gymandjam.theme") || "light";
        document.documentElement.setAttribute("data-theme", t);
      } catch (e) {}
    })();
  </script>
</head>
<body>
  <!-- Mobile top bar (hidden on desktop) -->
  <header class="topbar">
    <div class="topbar-brand">
      <span class="topbar-logo"><svg viewBox="0 0 24 24" fill="none"><path d="M6.5 8.5v7M3.5 10v4M17.5 8.5v7M20.5 10v4M6.5 12h11" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg></span>
    </div>
    <div class="ws-switch" id="wsSwitchMobile">
      <button class="ws-btn is-active" data-ws="train">Entreno</button>
      <button class="ws-btn" data-ws="food">Comida</button>
    </div>
    <div class="topbar-actions">
      <button class="topbar-btn" id="toolsBtn" type="button" aria-label="Herramientas">
        <svg viewBox="0 0 24 24" fill="none"><path d="M14.7 6.3a4 4 0 00-5.2 5.1l-5.6 5.6a1.5 1.5 0 002.1 2.1l5.6-5.6a4 4 0 005.1-5.2l-2.4 2.4-2.1-.5-.5-2.1z" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/></svg>
      </button>
      <button class="topbar-btn js-theme-toggle" type="button" aria-label="Cambiar tema">
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="4.2" stroke="currentColor" stroke-width="2"/><path d="M12 2v2.5M12 19.5V22M22 12h-2.5M4.5 12H2M19 5l-1.8 1.8M6.8 17.2 5 19M19 19l-1.8-1.8M6.8 6.8 5 5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
      <button class="topbar-btn account-btn" id="accountBtn" type="button" hidden aria-label="Cuenta">
        <span class="account-avatar sm" id="accountBtnAvatar">?</span>
      </button>
    </div>
  </header>

  <div class="app-shell">
    <!-- Sidebar / Nav -->
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-logo">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M6.5 8.5v7M3.5 10v4M17.5 8.5v7M20.5 10v4M6.5 12h11" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="brand-text">
          <span class="brand-name">Gym&Jam</span>
          <span class="brand-tag">Training Journal</span>
        </div>
      </div>

      <div class="ws-switch" id="wsSwitchDesktop">
        <button class="ws-btn is-active" data-ws="train">Entreno</button>
        <button class="ws-btn" data-ws="food">Comida</button>
      </div>

      <nav class="nav" id="nav">
        <div class="nav-label">Entrenamiento</div>
        <button class="nav-item is-active" data-view="today">
          <svg viewBox="0 0 24 24"><path d="M12 4v16m8-8H4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          <span>Entreno de hoy</span>
        </button>
        <button class="nav-item" data-view="templates">
          <svg viewBox="0 0 24 24"><path d="M4 5h16M4 5v14M20 5v14M4 19h16M9 5v14M4 10h5M4 14h5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" fill="none"/></svg>
          <span>Rutinas</span>
        </button>
        <button class="nav-item" data-view="history">
          <svg viewBox="0 0 24 24"><path d="M12 8v4l3 2M21 12a9 9 0 1 1-9-9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/><path d="M21 4v4h-4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span>Historial</span>
        </button>
        <button class="nav-item" data-view="stats">
          <svg viewBox="0 0 24 24"><path d="M4 20V10M10 20V4M16 20v-6M22 20H2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          <span>Estadísticas</span>
        </button>
        <button class="nav-item" data-view="exercises">
          <svg viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          <span>Ejercicios</span>
        </button>
      </nav>

      <nav class="nav" id="navFood" hidden>
        <div class="nav-label">Alimentación</div>
        <button class="nav-item" data-view="food-diary">
          <svg viewBox="0 0 24 24"><path d="M5 4h13a1 1 0 011 1v15H6a1 1 0 01-1-1zM8 8h7M8 12h7M8 16h4" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span>Diario</span>
        </button>
        <button class="nav-item" data-view="food-week">
          <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="17" rx="2" stroke="currentColor" stroke-width="1.8" fill="none"/><path d="M3 9h18M8 3v4M16 3v4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
          <span>Semana</span>
        </button>
        <button class="nav-item" data-view="food-goals">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8" stroke="currentColor" stroke-width="1.8" fill="none"/><circle cx="12" cy="12" r="3.2" stroke="currentColor" stroke-width="1.8" fill="none"/></svg>
          <span>Objetivos</span>
        </button>
        <button class="nav-item" data-view="food-foods">
          <svg viewBox="0 0 24 24"><path d="M6 3v7a2 2 0 004 0V3M8 10v11M16 3c-1.6 1-2.5 3-2.5 6 0 2 1 3 2.5 3v9" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span>Alimentos</span>
        </button>
        <button class="nav-item" data-view="food-weight">
          <svg viewBox="0 0 24 24"><path d="M12 3v18M7 21h10M6 7l-3 6a3 3 0 006 0zM18 7l-3 6a3 3 0 006 0zM4 7h16" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span>Peso</span>
        </button>
      </nav>

      <nav class="nav sidebar-tools">
        <div class="nav-label">Herramientas</div>
        <button class="nav-item js-timer-open" data-timer-mode="rest" type="button">
          <svg viewBox="0 0 24 24" fill="none"><path d="M7 3h10M7 21h10M8 3c0 4.5 4 5.5 4 9s-4 4.5-4 9M16 3c0 4.5-4 5.5-4 9s4 4.5 4 9" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span>Temporizador</span>
        </button>
        <button class="nav-item js-timer-open" data-timer-mode="stopwatch" type="button">
          <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="13" r="8" stroke="currentColor" stroke-width="2"/><path d="M12 9v4l2.5 2M9 2h6M12 5V2" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span>Cronómetro</span>
        </button>
        <button class="nav-item" id="convBtn" type="button">
          <svg viewBox="0 0 24 24" fill="none"><path d="M7 4H3m0 0l3-3M3 4l3 3M17 20h4m0 0l-3 3m3-3l-3-3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><path d="M7 4h9a4 4 0 013 7M17 20H8a4 4 0 01-3-7" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round"/></svg>
          <span>Conversor kg ⇄ lb</span>
        </button>
        <button class="nav-item" id="ormBtn" type="button">
          <svg viewBox="0 0 24 24" fill="none"><path d="M6.5 8.5v7M3.5 10v4M17.5 8.5v7M20.5 10v4M6.5 12h11" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          <span>Calculadora de 1RM</span>
        </button>
      </nav>

      <div class="sidebar-footer">
        <div id="accountBox"></div>
        <div class="streak-badge" id="streakBadge" title="Racha de entrenamiento">
          <div class="streak-top">
            <span class="streak-num" id="streakNum">0</span>
            <span class="streak-unit">días</span>
          </div>
          <span class="streak-label">Racha actual</span>
        </div>
      </div>
    </aside>

    <!-- Main content -->
    <main class="main" id="main">
      <!-- Views injected by JS -->
    </main>
  </div>

  <!-- Mobile bottom nav -->
  <nav class="mobile-nav" id="mobileNav">
    <button class="mnav-item is-active" data-view="today"><svg viewBox="0 0 24 24"><path d="M12 4v16m8-8H4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg><span>Entreno</span></button>
    <button class="mnav-item" data-view="templates"><svg viewBox="0 0 24 24"><path d="M4 5h16M4 5v14M20 5v14M4 19h16M9 5v14M4 10h5M4 14h5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" fill="none"/></svg><span>Rutinas</span></button>
    <button class="mnav-item" data-view="history"><svg viewBox="0 0 24 24"><path d="M12 8v4l3 2M21 12a9 9 0 1 1-9-9" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/><path d="M21 4v4h-4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg><span>Historial</span></button>
    <button class="mnav-item" data-view="stats"><svg viewBox="0 0 24 24"><path d="M4 20V10M10 20V4M16 20v-6M22 20H2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg><span>Stats</span></button>
    <button class="mnav-item" data-view="exercises"><svg viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg><span>Ejercicios</span></button>
  </nav>
  <nav class="mobile-nav" id="mobileNavFood" hidden>
    <button class="mnav-item is-active" data-view="food-diary"><svg viewBox="0 0 24 24"><path d="M5 4h13a1 1 0 011 1v15H6a1 1 0 01-1-1zM8 8h7M8 12h7M8 16h4" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round"/></svg><span>Diario</span></button>
    <button class="mnav-item" data-view="food-week"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="17" rx="2" stroke="currentColor" stroke-width="1.8" fill="none"/><path d="M3 9h18M8 3v4M16 3v4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg><span>Semana</span></button>
    <button class="mnav-item" data-view="food-goals"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8" stroke="currentColor" stroke-width="1.8" fill="none"/><circle cx="12" cy="12" r="3.2" stroke="currentColor" stroke-width="1.8" fill="none"/></svg><span>Objetivos</span></button>
    <button class="mnav-item" data-view="food-foods"><svg viewBox="0 0 24 24"><path d="M6 3v7a2 2 0 004 0V3M8 10v11M16 3c-1.6 1-2.5 3-2.5 6 0 2 1 3 2.5 3v9" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round"/></svg><span>Alimentos</span></button>
    <button class="mnav-item" data-view="food-weight"><svg viewBox="0 0 24 24"><path d="M12 3v18M7 21h10M6 7l-3 6a3 3 0 006 0zM18 7l-3 6a3 3 0 006 0zM4 7h16" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg><span>Peso</span></button>
  </nav>

  <!-- Theme toggle (floating, desktop) -->
  <button id="themeToggle" class="theme-toggle js-theme-toggle" type="button" title="Cambiar tema claro/oscuro" aria-label="Cambiar tema">
    <svg class="icon-moon" viewBox="0 0 24 24" fill="none"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>
    <svg class="icon-sun" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="4.2" stroke="currentColor" stroke-width="2"/><path d="M12 2v2.5M12 19.5V22M22 12h-2.5M4.5 12H2M19 5l-1.8 1.8M6.8 17.2 5 19M19 19l-1.8-1.8M6.8 6.8 5 5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
  </button>

  <!-- Toast host -->
  <div class="toast-host" id="toastHost"></div>

  <!-- Modal host -->
  <div class="modal-backdrop" id="modalBackdrop" hidden>
    <div class="modal" id="modal" role="dialog" aria-modal="true"></div>
  </div>

  <script src="js/theme.js"></script>
  <script src="js/timer.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/exercise-media.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/auth.js"></script>
  <script src="assets/vendor/zxing.min.js"></script>
  <script src="js/app.js"></script>
  <script src="js/install.js"></script>
  <script>
    /* Register the service worker (only over http/https, not file://). */
    if ("serviceWorker" in navigator && location.protocol.startsWith("http")) {
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("/sw.js").catch(function () {});
      });
    }
  </script>
</body>
</html>
