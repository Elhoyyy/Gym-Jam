<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 960" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Fondo abstracto de gimnasio">
  <defs>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e0451f" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#e0451f" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="spot" cx="18%" cy="12%" r="60%">
      <stop offset="0%" stop-color="#e0451f" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#e0451f" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="46" height="46" patternUnits="userSpaceOnUse">
      <path d="M46 0H0V46" fill="none" stroke="#8a8170" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- base washes -->
  <rect width="1440" height="960" fill="url(#spot)"/>
  <rect width="1440" height="960" fill="url(#grid)"/>
  <rect width="1440" height="960" fill="url(#glow)"/>

  <!-- large concentric rings (top-right) -->
  <g fill="none" stroke="#e0451f" stroke-opacity="0.10">
    <circle cx="1230" cy="150" r="120" stroke-width="2"/>
    <circle cx="1230" cy="150" r="196" stroke-width="1.5"/>
    <circle cx="1230" cy="150" r="280" stroke-width="1"/>
  </g>

  <!-- soft accent blob (bottom-left) -->
  <circle cx="120" cy="880" r="240" fill="#e0451f" fill-opacity="0.05"/>

  <!-- stylized barbell, lower-right, line art -->
  <g stroke="#6f675690" stroke-opacity="0.55" stroke-linecap="round" fill="none">
    <g transform="translate(915 700) rotate(-24)">
      <!-- bar -->
      <line x1="-300" y1="0" x2="300" y2="0" stroke="#8a8170" stroke-opacity="0.28" stroke-width="10"/>
      <!-- inner collars -->
      <line x1="-150" y1="-26" x2="-150" y2="26" stroke="#8a8170" stroke-opacity="0.30" stroke-width="12"/>
      <line x1="150" y1="-26" x2="150" y2="26" stroke="#8a8170" stroke-opacity="0.30" stroke-width="12"/>
      <!-- plates left -->
      <rect x="-210" y="-84" width="26" height="168" rx="10" stroke="#e0451f" stroke-opacity="0.35" stroke-width="4"/>
      <rect x="-250" y="-66" width="26" height="132" rx="10" stroke="#8a8170" stroke-opacity="0.30" stroke-width="4"/>
      <rect x="-286" y="-50" width="24" height="100" rx="9" stroke="#8a8170" stroke-opacity="0.24" stroke-width="4"/>
      <!-- plates right -->
      <rect x="184" y="-84" width="26" height="168" rx="10" stroke="#e0451f" stroke-opacity="0.35" stroke-width="4"/>
      <rect x="224" y="-66" width="26" height="132" rx="10" stroke="#8a8170" stroke-opacity="0.30" stroke-width="4"/>
      <rect x="262" y="-50" width="24" height="100" rx="9" stroke="#8a8170" stroke-opacity="0.24" stroke-width="4"/>
    </g>
  </g>

  <!-- diagonal accent strokes (top-left) -->
  <g stroke="#e0451f" stroke-opacity="0.14" stroke-width="3" stroke-linecap="round">
    <line x1="-20" y1="120" x2="150" y2="-40"/>
    <line x1="-20" y1="180" x2="210" y2="-40"/>
    <line x1="-20" y1="240" x2="270" y2="-40"/>
  </g>
</svg>
